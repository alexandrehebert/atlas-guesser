services:
  guesser:
    image: node:22-alpine
    container_name: guesser-app
    working_dir: /app
    ports:
      - "4102:4102"
    volumes:
      - ./:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=4102
    command: sh -c "npm install && npm run dev -- --webpack"
